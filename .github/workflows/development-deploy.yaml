name: Development Deploy

concurrency:
  group: development-deploy
  cancel-in-progress: false

permissions:
  contents: read

on:
  push:
    branches:
      - development
    paths:
      - 'bin/**'
      - 'src/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'
      - 'next.config.js'
      - 'tsconfig.json'
      - 'tailwind.config.ts'
      - 'postcss.config.cjs'
      - 'components.json'
      - 'app.defaults.json'
      - 'Dockerfile'

  workflow_dispatch:

env:
  REGISTRY: registry.digitalocean.com
  IMAGE_NAME: ${{ secrets.DO_REGISTRY_NAME }}/norse

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      app_id: ${{ steps.before.outputs.app_id }}
      deployment_id: ${{ steps.before.outputs.deployment_id }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Get active deployment ID before push
        id: before
        run: |
          APP_ID="${{ secrets.DO_DEVELOPMENT_APP_ID }}"

          ACTIVE_DEPLOYMENT=$(doctl apps list-deployments "$APP_ID" --format ID,Phase --no-header | grep ACTIVE | awk '{print $1}' | head -n1)
          echo "deployment_id=$ACTIVE_DEPLOYMENT" >> "$GITHUB_OUTPUT"
          echo "Current active deployment: $ACTIVE_DEPLOYMENT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Log in to DigitalOcean Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          password: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true
          build-args: |
            NEXT_PUBLIC_MAPBOX_API_KEY=${{ vars.NEXT_PUBLIC_MAPBOX_API_KEY }}
            NEXT_PUBLIC_MAPBOX_STYLE_URL=${{ vars.NEXT_PUBLIC_MAPBOX_STYLE_URL }}
            NEXT_PUBLIC_MAPLIBRE_STYLE_URL=${{ vars.NEXT_PUBLIC_MAPLIBRE_STYLE_URL }}
            NEXT_PUBLIC_UMAMI_SCRIPT_URL=${{ vars.NEXT_PUBLIC_UMAMI_SCRIPT_URL }}
          cache-from: type=local,src=${{ runner.temp }}/.buildx-cache
          cache-to: type=local,dest=${{ runner.temp }}/.buildx-cache-new,mode=max

      - name: Move cache
        run: |
          rm -rf ${{ runner.temp }}/.buildx-cache
          mv ${{ runner.temp }}/.buildx-cache-new ${{ runner.temp }}/.buildx-cache

  wait-for-deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Wait for new deployment to become active
        env:
          OLD_DEPLOYMENT_ID: ${{ needs.build-and-push.outputs.deployment_id }}
        run: |
          APP_ID="${{ secrets.DO_DEVELOPMENT_APP_ID }}"
          echo "Waiting for a new deployment to replace: $OLD_DEPLOYMENT_ID"
          MAX_ATTEMPTS=60
          SLEEP_SECONDS=30
          for i in $(seq 1 $MAX_ATTEMPTS); do
            CURRENT=$(doctl apps list-deployments "$APP_ID" --format ID,Phase --no-header | grep ACTIVE | awk '{print $1}' | head -n1)

            if [ -n "$CURRENT" ] && [ "$CURRENT" != "$OLD_DEPLOYMENT_ID" ]; then
              echo "New deployment is active: $CURRENT"
              echo "new_deployment_id=$CURRENT" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            # Check if latest deployment failed
            LATEST_PHASE=$(doctl apps list-deployments "$APP_ID" --format Phase --no-header | head -n1)
            if [ "$LATEST_PHASE" = "ERROR" ]; then
              echo "::error::Latest deployment failed with ERROR status"
              exit 1
            fi

            echo "Attempt $i/$MAX_ATTEMPTS - deployment not yet active (current: ${CURRENT:-none}, phase: ${LATEST_PHASE:-unknown}). Waiting ${SLEEP_SECONDS}s..."
            sleep $SLEEP_SECONDS
          done

          echo "::error::Timed out waiting for new deployment after $((MAX_ATTEMPTS * SLEEP_SECONDS)) seconds"
          exit 1

  e2e-tests:
    needs: wait-for-deploy
    uses: ./.github/workflows/e2e-tests.yaml
    secrets: inherit

  notify-build-failure:
    if: always() && needs.build-and-push.result == 'failure'
    needs: [build-and-push]
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack notification - Deploy failed
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":x: *Build & Push Failed*",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":x: *Development Build & Push Failed*\nDocker image build or push to registry failed.`\n*Commit:* `${{ github.sha }}`\n*Author:* ${{ github.actor }}"
                  }
                }
              ]
            }

  notify-e2e-failure:
    if: always() && needs.e2e-tests.result == 'failure'
    needs: [e2e-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack notification - E2E tests failed
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":rotating_light: *E2E Tests Failed*",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":rotating_light: *Development E2E Tests Failed*\nEnd-to-end tests failed after successful deployment.\n*Commit:* `${{ github.sha }}`\n*Author:* ${{ github.actor }}"
                  }
                }
              ]
            }
