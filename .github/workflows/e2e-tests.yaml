name: Run E2E Test

permissions:
  contents: read

on:
  push:
    branches:
      - main

  workflow_call:

  workflow_dispatch:

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        environment:
          - name: staging
            url: ${{ vars.TEST_STG_URL }}
            email: ${{ secrets.TEST_STG_USER_EMAIL }}
            password: ${{ secrets.TEST_STG_USER_PASSWORD }}
          - name: development
            url: ${{ vars.TEST_DEV_URL }}
            email: ${{ secrets.TEST_DEV_USER_EMAIL }}
            password: ${{ secrets.TEST_DEV_USER_PASSWORD }}
    env:
      CI: true
      E2E_BASE_URL: ${{ matrix.environment.url }}
      TEST_USER_EMAIL: ${{ matrix.environment.email }}
      TEST_USER_PASSWORD: ${{ matrix.environment.password }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report-${{ matrix.environment.name }}
          path: |
            playwright-report/
          if-no-files-found: ignore
          retention-days: 30
